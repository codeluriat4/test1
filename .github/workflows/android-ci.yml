name: Android Release APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # Compiles the Jetpack Compose project structure
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # Fails fast with a clear message instead of the cryptic apksigner
      # BadPaddingException you get when a signing secret is empty/unset
      - name: Validate Signing Secrets
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          for var in SIGNING_KEY_BASE64 KEY_ALIAS KEYSTORE_PASSWORD KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Secret $var is missing or empty in repo/org settings"
              exit 1
            fi
          done

      # This action decodes signingKeyBase64 into a keystore itself, so the
      # separate manual "Decode Keystore" step from the old workflow was
      # dead code (it wrote my.keystore but nothing ever read that file)
      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        env:
          BUILD_TOOLS_VERSION: "36.0.0"
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 7
