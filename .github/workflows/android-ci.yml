name: Android Release APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.SIGNING_KEY_BASE64 }}
      run: echo "$ENCODED_STRING" | base64 --decode > my.keystore

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # Compiles the Jetpack Compose project structure
    - name: Build Release APK
      run: ./gradlew assembleRelease

    # Signs the APK with the decrypted my.keystore file
    - name: Sign Release APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      env:
        BUILD_TOOLS_VERSION: "36.0.0"
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: android-release-apk
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
        retention-days: 7
