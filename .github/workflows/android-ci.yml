name: Android Release Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # allows manual runs from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17 # matches sourceCompatibility/jvmTarget in app/build.gradle.kts
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle # built-in Gradle dependency caching, no separate cache action needed

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          echo "$SIGNING_KEY_BASE64" | base64 -d > my.keystore
          chmod 600 my.keystore # restrict the reconstructed keystore to the runner user

      - name: Assemble release APK
        run: ./gradlew assembleRelease

      - name: Sign release APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }} # action decodes this itself; same secret backing my.keystore above
          alias: ${{ secrets.KEY_ALIAS }} # maps to 'main'
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 7
